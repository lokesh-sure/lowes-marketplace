{% extends "base.html" %}

{% block title %}Login | MarketNest{% endblock %}

{% block extra_css %}
<style>

.auth-box{
    width:400px;
    margin:60px auto;
    background:#fff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.auth-box h2{
    text-align:center;
    margin-bottom:25px;
    color:#4f46e5;
}

.auth-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

.auth-box input:focus{
    border-color:#4f46e5;
}

.auth-box button{
    width:100%;
    padding:12px;
    border:none;
    background:#4f46e5;
    color:#fff;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.auth-box button:hover{
    background:#3730a3;
}

.message{
    margin-bottom:15px;
    padding:10px;
    border-radius:6px;
    background:#eef2ff;
    color:#3730a3;
    text-align:center;
}

.register-link{
    text-align:center;
    margin-top:18px;
}

.register-link a{
    text-decoration:none;
    color:#4f46e5;
    font-weight:bold;
}

</style>
{% endblock %}

{% block content %}

<div class="auth-box">

    <h2>Login</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="message">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <div class="register-link">
        Don't have an account?
        <a href="{% url 'accounts:register' %}">
            Register
        </a>
    </div>

</div>

{% endblock %}
