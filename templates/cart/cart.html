<!DOCTYPE html>
<html>
<head>
    <title>My Cart</title>
</head>
<body>

    <h1>My Cart</h1>

    {% for item in cart_items %}

        <hr>

        <h3>{{ item.product.name }}</h3>

        <p>Quantity: {{ item.quantity }}</p>

        <p>Price: ₹{{ item.product.price }}</p>

        <a href="/cart/remove/{{ item.id }}/">
            Remove Item
        </a>

    {% empty %}

        <p>Your cart is empty.</p>

    {% endfor %}

    <hr>

    <h2>Total: ₹{{ total }}</h2>

</body>
</html>
